global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: paycore-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8080

  - job_name: paycore-outbox-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9091

  - job_name: paycore-settlement-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9093
